spring:
  datasource:
    url: jdbc:h2:mem:workflowdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    config:
      enabled: false
  config:
    import: ""
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999
